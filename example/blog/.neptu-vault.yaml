version: 1
contentRoot: src

media:
  uploadMode: global-folder
  globalFolder: src/public/media
  compression:
    enabled: true
    maxDimension: 1920
    quality: 0.65
    format: webp

schemas:
  - glob: "src/post/**/*.md"
    fields:
      - key: title
        type: text
        label: Title
        required: true

      - key: date
        type: datetime
        label: Publication date
        required: true

      - key: description
        type: textarea
        label: Description
        required: false

      - key: previewText
        type: textarea
        label: Replace text for preview
        required: false

      - key: descrAsPreview
        type: checkbox
        label: Use description as a preview
        default: true

      - key: canonical
        type: text
        label: Canonical URL
        default: self
        required: false

      - key: jsonLd
        type: textarea
        label: JSON-LD in YAML format
        required: false

      - key: cover
        type: image
        label: Cover
        required: false

      - key: coverDescr
        type: text
        label: Cover description
        required: false

      - key: coverAlt
        type: text
        label: Cover alt text
        required: false

      - key: commentUrl
        type: text
        label: Comment URL
        required: false

      - key: authorId
        type: select
        label: Author
        required: false
        options:
          - label: Ivan K
            value: ivan-k

      - key: videoLink
        type: text
        label: Video URL
        required: false

      - key: videoLinkLang
        type: select
        label: Video language
        default: ""
        required: false
        options:
          - label: Default
            value: ""
          - label: Russian
            value: RU
          - label: English
            value: EN

      # Podcasts — flattened from Sveltia object widget
      - key: podcastCastbox
        type: text
        label: Podcast Castbox
        required: false

      - key: podcastSoundstream
        type: text
        label: Podcast Soundstream
        required: false

      - key: podcastSpotify
        type: text
        label: Podcast Spotify
        required: false

      - key: podcastVk
        type: text
        label: Podcast VK
        required: false

      - key: podcastYandexmusic
        type: text
        label: Podcast Yandex Music
        required: false

      # Tags relation — currently mapped as text, see notes below
      - key: tags
        type: text
        label: Tags
        required: false