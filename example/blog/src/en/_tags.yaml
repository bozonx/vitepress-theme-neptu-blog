# ---------------------------------------------------------------------------
# Per-locale tag registry. A tag must be listed here to appear in the tags
# cloud and to get a generated listing page at `/en/tags/<slug>/1`.
# `name` is what you reference from a post's `tags:` frontmatter.
# Optional `slug` overrides the auto-generated URL slug.
# ---------------------------------------------------------------------------
- name: guide # meta posts explaining the demo itself
- name: frontmatter # posts demonstrating frontmatter fields
- name: cover # cover-image options
- name: media # media components (video/audio/download)
- name: seo # SEO features (OG, JSON-LD, canonical, hreflang)
- name: json-ld # structured data
- name: canonical # canonical links / cross-posting
- name: i18n # localization / hreflang
- name: preview # post-list preview & search options
