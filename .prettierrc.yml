printWidth: 80
tabWidth: 2
useTabs: false
semi: false
singleQuote: true
quoteProps: as-needed
trailingComma: es5
bracketSpacing: true
bracketSameLine: false
arrowParens: always
objectWrap: collapse

plugins:
  - prettier-plugin-jsdoc

jsdocSpaces: 1
jsdocDescriptionWithDot: false
jsdocDescriptionTag: false
